<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjett kortet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style2.css">
    

</head>

<body>

    <header>
        <div class="headerDiv">
            <img src="kortstokk/Anglo-American_card_suits.png" alt="">
            <h1>Kortspill</h1>
        </div>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
    </header>

    <main>
        <h1>Gjett kortet:</h1>
        <p>Prøv å gjett det riktige kortet, ved å skrive inn gjettet ditt under!</p>
        <img class="bilde" src="kortstokk/bakside.png" alt="">
        <p id="hint">Hint kommer her!</p>
        <div class="svar">
            <input id="gjett" type="number" >
            <select id="gjettSort">
                <option value=""></option>
                <option value="spades">Spar</option>
                <option value="hearts">Hjerter</option>
                <option value="clubs">Kløver</option>
                <option value="diamonds">Ruter</option>
            </select>
            <button onclick="sjekkSvar()">Sjekk</button>
        </div>
    </main>

    <script src="script2.js"></script>

</body>

</html>
